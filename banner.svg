<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040a14;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#071828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff" />
      <stop offset="50%" style="stop-color:#00f5ff" />
      <stop offset="100%" style="stop-color:#9b30ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00f5ff" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/><line x1="1000" y1="0" x2="1000" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
  </g>

  <!-- Glow circles -->
  <circle cx="200" cy="250" r="200" fill="#0080ff" opacity="0.05"/>
  <circle cx="1000" cy="250" r="180" fill="#9b30ff" opacity="0.05"/>
  <circle cx="600" cy="250" r="250" fill="#00f5ff" opacity="0.04"/>

  <!-- Decorative hexagons -->
  <polygon points="60,120 90,103 120,120 120,154 90,171 60,154" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.2"/>
  <polygon points="1080,200 1110,183 1140,200 1140,234 1110,251 1080,234" fill="none" stroke="#9b30ff" stroke-width="1" opacity="0.2"/>
  <polygon points="980,350 1010,333 1040,350 1040,384 1010,401 980,384" fill="none" stroke="#00f5ff" stroke-width="0.8" opacity="0.15"/>

  <!-- Top eyebrow text -->
  <text x="600" y="140" text-anchor="middle" font-family="monospace" font-size="14" fill="#00f5ff" opacity="0.7" letter-spacing="8">◆ ANNUAL TECHNICAL SHOWCASE ◆</text>

  <!-- Main Title -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="90" font-weight="900" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="6">INNOVATEX</text>

  <!-- Subtitle -->
  <text x="600" y="285" text-anchor="middle" font-family="monospace" font-size="22" fill="#0080ff" letter-spacing="10">PROJECT EXPO 2026</text>

  <!-- Divider line -->
  <line x1="350" y1="310" x2="850" y2="310" stroke="#00f5ff" stroke-width="1" opacity="0.3"/>

  <!-- Date info -->
  <text x="600" y="340" text-anchor="middle" font-family="monospace" font-size="14" fill="#8ab4d4" letter-spacing="4">MARCH 21 – 22, 2026  |  MAIN CAMPUS</text>

  <!-- Tag line -->
  <text x="600" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#4a6d8a" font-style="italic">"Innovation Beyond Boundaries"</text>

  <!-- Bottom bar -->
  <rect x="0" y="470" width="1200" height="30" fill="#00f5ff" opacity="0.03"/>
  <text x="600" y="490" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a6d8a" letter-spacing="3">DEPT. OF COMPUTER SCIENCE &amp; ENGINEERING</text>
</svg>
