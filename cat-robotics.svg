<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#040a14" rx="10"/>
  <!-- Robot body -->
  <rect x="155" y="110" width="90" height="80" fill="none" stroke="#00f5ff" stroke-width="2" rx="6" opacity="0.8"/>
  <!-- Robot head -->
  <rect x="168" y="70"  width="64" height="46" fill="none" stroke="#9b30ff" stroke-width="1.8" rx="5" opacity="0.8"/>
  <!-- Eyes -->
  <circle cx="186" cy="90" r="8" fill="#00f5ff" opacity="0.2" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="214" cy="90" r="8" fill="#00f5ff" opacity="0.2" stroke="#00f5ff" stroke-width="1.5"/>
  <circle cx="186" cy="90" r="3" fill="#00f5ff" opacity="0.9"/>
  <circle cx="214" cy="90" r="3" fill="#00f5ff" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="200" y1="70" x2="200" y2="50" stroke="#9b30ff" stroke-width="1.5" opacity="0.7"/>
  <circle cx="200" cy="46" r="5" fill="none" stroke="#9b30ff" stroke-width="1.5" opacity="0.7"/>
  <!-- Arms -->
  <rect x="110" y="115" width="45" height="14" fill="none" stroke="#00ff88" stroke-width="1.5" rx="4" opacity="0.7"/>
  <rect x="245" y="115" width="45" height="14" fill="none" stroke="#00ff88" stroke-width="1.5" rx="4" opacity="0.7"/>
  <!-- Legs -->
  <rect x="165" y="190" width="22" height="35" fill="none" stroke="#0080ff" stroke-width="1.5" rx="3" opacity="0.7"/>
  <rect x="213" y="190" width="22" height="35" fill="none" stroke="#0080ff" stroke-width="1.5" rx="3" opacity="0.7"/>
  <!-- Chest panel -->
  <rect x="168" y="125" width="25" height="18" fill="#9b30ff" opacity="0.2" stroke="#9b30ff" stroke-width="1" rx="2"/>
  <rect x="207" y="125" width="25" height="18" fill="#0080ff" opacity="0.2" stroke="#0080ff" stroke-width="1" rx="2"/>
  <text x="200" y="248" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ff88" letter-spacing="2" opacity="0.9">ROBOTICS &amp; AUTOMATION</text>
</svg>
