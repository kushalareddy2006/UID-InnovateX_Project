<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260">
  <rect width="400" height="260" fill="#040a14" rx="10"/>
  <!-- Central chip -->
  <rect x="160" y="90" width="80" height="80" fill="none" stroke="#00f5ff" stroke-width="2" rx="4"/>
  <rect x="175" y="105" width="50" height="50" fill="#00f5ff" opacity="0.06" rx="2"/>
  <text x="200" y="136" text-anchor="middle" font-family="monospace" font-size="10" fill="#00f5ff" opacity="0.8">MCU</text>
  <!-- Pins left -->
  <g stroke="#00ff88" stroke-width="1.5" opacity="0.7">
    <line x1="100" y1="105" x2="160" y2="105"/><line x1="100" y1="120" x2="160" y2="120"/>
    <line x1="100" y1="135" x2="160" y2="135"/><line x1="100" y1="150" x2="160" y2="150"/>
    <line x1="100" y1="165" x2="160" y2="165"/>
  </g>
  <!-- Pins right -->
  <g stroke="#9b30ff" stroke-width="1.5" opacity="0.7">
    <line x1="240" y1="105" x2="300" y2="105"/><line x1="240" y1="120" x2="300" y2="120"/>
    <line x1="240" y1="135" x2="300" y2="135"/><line x1="240" y1="150" x2="300" y2="150"/>
    <line x1="240" y1="165" x2="300" y2="165"/>
  </g>
  <!-- Nodes -->
  <circle cx="80"  cy="105" r="7" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
  <circle cx="80"  cy="135" r="7" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
  <circle cx="80"  cy="165" r="7" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.8"/>
  <circle cx="320" cy="105" r="7" fill="none" stroke="#9b30ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="320" cy="135" r="7" fill="none" stroke="#9b30ff" stroke-width="1.5" opacity="0.8"/>
  <circle cx="320" cy="165" r="7" fill="none" stroke="#9b30ff" stroke-width="1.5" opacity="0.8"/>
  <text x="200" y="240" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ff88" letter-spacing="3" opacity="0.9">IoT &amp; EMBEDDED</text>
</svg>
